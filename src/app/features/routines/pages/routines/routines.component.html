<div class="routines">
  <div class="routines__header">
    <h1 class="routines__title">Rutinas</h1>
    <div class="routines__fab">
      <ds-icon name="plus" [size]="22" color="#06201B"/>
    </div>
  </div>

  <div class="routines__filters">
    <div class="routines__segment">
      <div *ngFor="let f of filters; let i = index"
           class="routines__seg-item"
           [class.routines__seg-item--active]="i === activeFilter"
           (click)="activeFilter = i">
        {{ f }}
      </div>
    </div>
  </div>

  <div class="routines__list">
    <ds-card *ngFor="let r of routines" [raised]="true" [pad]="16">
      <div class="routines__item">
        <div class="routines__icon" [style.background]="toneBg(r.tone)">
          <ds-icon name="dumbbell" [size]="22" [color]="toneColor(r.tone)"/>
        </div>
        <div class="routines__info">
          <div class="routines__meta">
            <ds-badge tone="neutral">{{ r.category }}</ds-badge>
            <span class="routines__last">· {{ r.last }}</span>
          </div>
          <div class="routines__name">{{ r.name }}</div>
          <div class="routines__details">
            <span><ds-icon name="dumbbell" [size]="12"/> {{ r.exercises }} ejercicios</span>
            <span><ds-icon name="clock" [size]="12"/> {{ r.minutes }} min</span>
          </div>
        </div>
        <div class="routines__play">
          <ds-icon name="play" [size]="16" color="var(--dme-mint)"/>
        </div>
      </div>
    </ds-card>
  </div>
</div>

<ds-tab-bar active="routines"/>
