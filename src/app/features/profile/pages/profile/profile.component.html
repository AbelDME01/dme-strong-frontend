<div class="profile">
  <div class="profile__header">
    <h1 class="profile__title">Perfil</h1>
    <div class="profile__settings-btn">
      <ds-icon name="settings" [size]="18" color="var(--dme-text)"/>
    </div>
  </div>

  <!-- Profile Card -->
  <ds-card [raised]="true" style="margin-top: 18px; padding: 18px;">
    <div class="profile__card">
      <div class="profile__avatar">R</div>
      <div class="profile__info">
        <div class="profile__name">Rubén García</div>
        <div class="profile__email">ruben&#64;dme.app</div>
        <div class="profile__badges">
          <ds-badge tone="mint">PRO</ds-badge>
          <ds-badge tone="neutral">3 años</ds-badge>
        </div>
      </div>
    </div>
  </ds-card>

  <!-- Body Stats -->
  <div class="profile__stats">
    <ds-card *ngFor="let s of bodyStats" [raised]="true" [pad]="12">
      <div class="profile__stat-label">{{ s.label }}</div>
      <div class="profile__stat-value">{{ s.value }}<span class="profile__stat-unit">{{ s.unit }}</span></div>
      <div *ngIf="s.trend" class="profile__stat-trend">{{ s.trend }} sem</div>
    </ds-card>
  </div>

  <!-- Account Menu -->
  <div class="profile__section-label">Cuenta</div>
  <ds-card [pad]="0">
    <div *ngFor="let m of accountMenu; let last = last"
         class="profile__menu-item"
         [class.profile__menu-item--last]="last">
      <div class="profile__menu-icon profile__menu-icon--mint">
        <ds-icon [name]="m.icon" [size]="16" color="var(--dme-mint)"/>
      </div>
      <div class="profile__menu-label">{{ m.label }}</div>
      <div *ngIf="m.right" class="profile__menu-right">{{ m.right }}</div>
      <ds-icon name="chevron" [size]="16" color="var(--dme-text-mute)"/>
    </div>
  </ds-card>

  <!-- Preferences Menu -->
  <div class="profile__section-label">Preferencias</div>
  <ds-card [pad]="0">
    <div *ngFor="let m of prefsMenu; let last = last"
         class="profile__menu-item"
         [class.profile__menu-item--last]="last">
      <div class="profile__menu-icon">
        <ds-icon [name]="m.icon" [size]="16" color="var(--dme-text-dim)"/>
      </div>
      <div class="profile__menu-label">{{ m.label }}</div>
      <div *ngIf="m.right" class="profile__menu-right">{{ m.right }}</div>
      <ds-icon name="chevron" [size]="16" color="var(--dme-text-mute)"/>
    </div>
  </ds-card>

  <div style="margin-top: 18px;">
    <ds-button variant="danger" [full]="true" size="md" icon="logout">Cerrar sesión</ds-button>
  </div>
</div>

<ds-tab-bar active="profile"/>
