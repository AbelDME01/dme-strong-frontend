<div class="workout">
  <div class="workout__header">
    <a routerLink="/routines" class="workout__back">
      <ds-icon name="chevronL" [size]="20" color="var(--dme-text)"/>
    </a>
    <div class="workout__title-block">
      <div class="workout__progress-label">Ejercicio 1 / 6</div>
      <div class="workout__routine-name">Empuje · Pecho y tríceps</div>
    </div>
    <div class="workout__timer-badge">
      <div class="workout__timer-dot"></div>
      <span class="workout__timer-value">24:17</span>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="workout__progress-bar">
    <div class="workout__progress-fill"></div>
  </div>

  <!-- Rest Timer -->
  <div class="workout__rest">
    <div class="workout__rest-header">
      <span class="workout__rest-label">Descanso</span>
      <ds-icon name="timer" [size]="18" color="#06201B"/>
    </div>
    <div class="workout__rest-time">1:42</div>
    <div class="workout__rest-next">Siguiente: Serie 3 · 85 kg × 7</div>
    <div class="workout__rest-actions">
      <div class="workout__rest-add">
        <ds-icon name="plus" [size]="14" color="#06201B"/> +15s
      </div>
      <div class="workout__rest-skip">
        <ds-icon name="chevron" [size]="14" color="var(--dme-mint)"/> Saltar descanso
      </div>
    </div>
  </div>

  <!-- Exercise -->
  <div class="workout__exercise">
    <div>
      <div class="workout__exercise-name">Press banca</div>
      <div class="workout__exercise-meta">Barra · 4 series</div>
    </div>
    <div class="workout__note-btn">
      <ds-icon name="note" [size]="16" color="var(--dme-text-dim)"/>
    </div>
  </div>

  <!-- Sets Table -->
  <div class="workout__sets-header">
    <span class="workout__col-hdr">#</span>
    <span class="workout__col-hdr">Peso</span>
    <span class="workout__col-hdr">Reps</span>
    <span class="workout__col-hdr">RPE</span>
    <span class="workout__col-hdr"></span>
  </div>

  <div class="workout__sets">
    <div *ngFor="let s of sets"
         class="workout__set"
         [class.workout__set--active]="s.active"
         [class.workout__set--done]="s.done">
      <span class="workout__set-num" [style.color]="s.active ? 'var(--dme-mint)' : 'var(--dme-text-dim)'">{{ s.n }}</span>
      <span class="workout__set-weight">{{ s.weight }}<span class="workout__unit">kg</span></span>
      <span class="workout__set-reps">{{ s.reps || '—' }}</span>
      <span class="workout__set-rpe" [style.color]="rpeColor(s.rpe)">{{ s.rpe || '—' }}</span>
      <div class="workout__set-check" [class.workout__set-check--done]="s.done">
        <ds-icon *ngIf="s.done" name="check" [size]="14" color="#06201B"/>
      </div>
    </div>
  </div>

  <ds-button [full]="true" size="lg" icon="check" style="margin-top: 14px">Completar serie</ds-button>
</div>
