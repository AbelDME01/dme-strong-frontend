<div class="history">
  <div class="history__header">
    <h1 class="history__title">Historial</h1>
    <div class="history__actions">
      <div class="history__action-btn"><ds-icon name="filter" [size]="18" color="var(--dme-text)"/></div>
      <div class="history__action-btn"><ds-icon name="calendar" [size]="18" color="var(--dme-text)"/></div>
    </div>
  </div>

  <!-- Month Hero -->
  <ds-card [raised]="true" style="margin-top: 18px;">
    <div class="history__month-hero">
      <div>
        <div class="history__month-label">Abril 2026</div>
        <div class="history__month-count">
          <span class="history__month-num">14</span>
          <span class="history__month-unit">entrenos</span>
        </div>
      </div>
      <div class="history__month-trend">
        <div class="history__month-pct">+18%</div>
        <div class="history__month-vs">vs marzo</div>
      </div>
    </div>
    <div class="history__bars">
      <div *ngFor="let h of chartBars; let i = index"
           class="history__bar"
           [class.history__bar--latest]="i === chartBars.length - 1"
           [class.history__bar--recent]="i >= chartBars.length - 4 && i < chartBars.length - 1"
           [style.height]="barHeight(h)">
      </div>
    </div>
  </ds-card>

  <!-- Workouts List -->
  <div class="history__list">
    <ds-card *ngFor="let w of workouts" [raised]="true" [pad]="14" style="margin-bottom: 10px;">
      <div class="history__item-header">
        <div class="history__date-badge">
          <div class="history__date-month">ABR</div>
          <div class="history__date-day">{{ w.day }}</div>
        </div>
        <div class="history__item-info">
          <div class="history__item-name">{{ w.name }}</div>
          <div class="history__item-time">{{ w.date }} · {{ w.time }}</div>
        </div>
        <div *ngIf="w.prs > 0" class="history__prs-badge">
          <ds-icon name="trophy" [size]="13" color="var(--dme-amber)"/>
          <span>{{ w.prs }}</span>
        </div>
      </div>
      <div class="history__item-stats">
        <div class="history__stat">
          <div class="history__stat-label">Volumen</div>
          <div class="history__stat-value">{{ w.vol }}</div>
        </div>
        <div class="history__stat">
          <div class="history__stat-label">Series</div>
          <div class="history__stat-value">{{ w.sets }}</div>
        </div>
        <div class="history__stat">
          <div class="history__stat-label">Duración</div>
          <div class="history__stat-value">{{ w.dur }}</div>
        </div>
      </div>
    </ds-card>
  </div>
</div>

<ds-tab-bar active="history"/>
