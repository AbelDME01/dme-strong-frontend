<div class="register">
  <div class="register__header">
    <a routerLink="/auth/login" class="register__back">
      <ds-icon name="chevronL" [size]="20" color="var(--dme-text)"/>
    </a>
    <span class="register__step">Paso 1 de 3</span>
  </div>

  <div class="register__hero">
    <h1 class="register__title">Crea tu cuenta</h1>
    <p class="register__subtitle">Empecemos con lo básico.</p>
  </div>

  <div class="register__form">
    <ds-input label="Nombre" value="Rubén García" icon="user"/>
    <ds-input label="Email" placeholder="tu@email.com" icon="note"/>
    <ds-input label="Contraseña" placeholder="Mínimo 8 caracteres" icon="settings"/>
  </div>

  <div class="register__strength">
    <div class="register__strength-bars">
      <div class="register__strength-bar register__strength-bar--active"></div>
      <div class="register__strength-bar register__strength-bar--active"></div>
      <div class="register__strength-bar register__strength-bar--active"></div>
      <div class="register__strength-bar"></div>
    </div>
    <span class="register__strength-label">Contraseña fuerte</span>
  </div>

  <div class="register__footer">
    <p class="register__terms">Al continuar aceptas los términos y la política de privacidad.</p>
    <ds-button [full]="true" size="lg" iconRight="chevron">Continuar</ds-button>
  </div>
</div>
