<div class="home-b">
  <div class="home-b__header">
    <ds-logo [size]="28"/>
    <div class="home-b__search">
      <ds-icon name="search" [size]="18" color="var(--dme-text)"/>
    </div>
  </div>

  <!-- Streak Hero -->
  <div class="home-b__streak">
    <div class="home-b__streak-label">Racha activa</div>
    <div class="home-b__streak-row">
      <div class="home-b__streak-num">12</div>
      <div class="home-b__streak-unit">días</div>
      <ds-icon name="fire" [size]="38" color="var(--dme-coral)" style="margin-left: auto"/>
    </div>
    <p class="home-b__streak-sub">Sigue así. Tu récord son 18 días.</p>
  </div>

  <!-- Ring Card -->
  <ds-card [raised]="true" style="margin-top: 22px;">
    <div class="home-b__ring-card">
      <div class="home-b__ring">
        <svg width="88" height="88" viewBox="0 0 88 88">
          <circle cx="44" cy="44" r="36" fill="none" stroke="var(--dme-surface3)" stroke-width="8"/>
          <circle cx="44" cy="44" r="36" fill="none" stroke="var(--dme-mint)" stroke-width="8"
            stroke-linecap="round"
            [attr.stroke-dasharray]="ringCircumference"
            [attr.stroke-dashoffset]="ringOffset"
            transform="rotate(-90 44 44)"/>
        </svg>
        <div class="home-b__ring-pct">68%</div>
      </div>
      <div class="home-b__ring-info">
        <div class="home-b__ring-title">Meta semanal</div>
        <div class="home-b__ring-sub">3 de 5 entrenos</div>
        <div class="home-b__ring-cta">+ 2 para cerrar la semana</div>
      </div>
    </div>
  </ds-card>

  <!-- Next Workout Banner -->
  <div class="home-b__next">
    <div class="home-b__next-icon">
      <ds-icon name="play" [size]="24" color="#06201B"/>
    </div>
    <div class="home-b__next-info">
      <div class="home-b__next-label">SIGUIENTE</div>
      <div class="home-b__next-title">Empuje · Pecho y tríceps</div>
      <div class="home-b__next-meta">6 ejercicios · 52 min</div>
    </div>
    <ds-icon name="chevron" [size]="20" color="#06201B"/>
  </div>

  <!-- Quick Actions -->
  <div class="home-b__actions">
    <div class="home-b__actions-title">Acciones rápidas</div>
    <div class="home-b__actions-grid">
      <ds-card *ngFor="let a of quickActions" [raised]="true" [pad]="14">
        <div class="home-b__action-icon" [style.background]="getIconBg(a.tone)">
          <ds-icon [name]="a.icon" [size]="18" [color]="getIconColor(a.tone)"/>
        </div>
        <div class="home-b__action-label">{{ a.label }}</div>
      </ds-card>
    </div>
  </div>
</div>

<ds-tab-bar active="home"/>
